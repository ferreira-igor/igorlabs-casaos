---
name: igorlabs-readarr
services:
  readarr:
    container_name: readarr
    image: ghcr.io/linuxserver/readarr:develop
    restart: unless-stopped
    networks:
      - servarr
    ports:
      - 8787:8787
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /mnt/exthd/data:/data
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
networks:
  servarr:
    external: true
    name: servarr
x-casaos:
  architectures:
    - amd64
    - arm64
  main: readarr
  developer: readarr.com
  category: Books
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/readarr.png
  index: /
  port_map: "8787"
  scheme: http
  title:
    custom: Readarr
    en_us: Readarr
