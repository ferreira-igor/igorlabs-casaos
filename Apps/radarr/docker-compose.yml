---
name: igorlabs-radarr
networks:
  arr_net:
    external: true
    name: arr_net
services:
  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    deploy:
      resources:
        limits:
          memory: 2G
    stop_grace_period: 5m
    restart: unless-stopped
    networks:
      - arr_net
    ports:
      - 7878:7878
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /mnt/exthd/data:/data
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
x-casaos:
  architectures:
    - amd64
    - arm64
  main: radarr
  developer: radarr.video
  category: Movies
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/radarr.png
  index: /
  port_map: "7878"
  scheme: http
  title:
    custom: Radarr
    en_us: Radarr
